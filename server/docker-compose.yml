services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8081:8080"
    restart: unless-stopped

  server:
    build: .
    ports:
      - "8080:8080"
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Internal Keycloak hostname so the server can verify JWTs via JWKS.
      # OIDC_ISSUER stays as the public URL (must match the `iss` claim in tokens).
      OIDC_KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
