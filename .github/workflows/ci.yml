name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ── Python agent ─────────────────────────────────────────────────────────────
  test-agent:
    name: Agent — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: client/agent
        run: uv sync

      - name: Run tests
        working-directory: client/agent
        run: uv run pytest -v

  # ── React UI ──────────────────────────────────────────────────────────────────
  test-ui:
    name: UI — vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/ui/package-lock.json

      - name: Install dependencies
        working-directory: client/ui
        run: npm ci

      - name: Run tests
        working-directory: client/ui
        run: npm test

  # ── Electron shell ────────────────────────────────────────────────────────────
  test-electron:
    name: Electron — tsc + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run tests (typecheck + preload unit)
        working-directory: client
        run: npm test

  # ── Agent binary — PyInstaller --optimize 2 ───────────────────────────────────
  # Runs only on push (not on PRs) to avoid spending minutes on unmerged branches.
  build-agent:
    name: Agent — PyInstaller (–O2, linux-x64)
    runs-on: ubuntu-latest
    needs: test-agent
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install runtime deps + PyInstaller
        working-directory: client/agent
        run: |
          uv sync --no-dev
          uv pip install pyinstaller

      - name: Build binary
        working-directory: client/agent
        # optimize=2 is set in EXE() inside rs_agent.spec (strips docstrings + asserts).
        # --optimize is a makespec-only flag and cannot be used with an existing .spec file.
        run: uv run pyinstaller rs_agent.spec --distpath dist --noconfirm

      - name: Smoke-test binary
        working-directory: client/agent
        run: |
          ./dist/rs-agent/rs-agent &
          sleep 3
          curl -sf http://127.0.0.1:8000/health | grep '"ok"'
          kill %1

      - uses: actions/upload-artifact@v4
        with:
          name: rs-agent-linux-x64
          path: client/agent/dist/rs-agent/
          retention-days: 14

  # ── UI production build — Vite + Terser ──────────────────────────────────────
  build-ui:
    name: UI — Vite prod (Terser –O3, toplevel mangle)
    runs-on: ubuntu-latest
    needs: test-ui
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/ui/package-lock.json

      - name: Install dependencies
        working-directory: client/ui
        run: npm ci

      - name: Build (Terser minified)
        working-directory: client/ui
        run: npm run build

      - name: Report bundle size
        working-directory: client/ui/dist/assets
        run: |
          echo "=== JS bundles ===" && du -sh *.js 2>/dev/null || true
          echo "=== CSS bundles ===" && du -sh *.css 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: client/ui/dist/
          retention-days: 14

  # ── Server Docker image — ships only .pyc ────────────────────────────────────
  build-server:
    name: Server — Docker (.pyc only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: server
        run: docker build -t rs-server:ci .

      - name: Verify no .py source files in image
        run: |
          PY_COUNT=$(docker run --rm --entrypoint find rs-server:ci /app/src -name "*.py" | wc -l)
          echo ".py files remaining: $PY_COUNT"
          [ "$PY_COUNT" -eq 0 ] || (echo "ERROR: source files found in image" && exit 1)

      - name: Smoke-test import from .pyc
        run: |
          docker run --rm --entrypoint python rs-server:ci -c "
          import sys; sys.path.insert(0, '/app/src')
          from main import app
          print('Routes:', len(app.routes))
          assert len(app.routes) > 0
          print('OK — imported from .pyc, no .py present')
          "
