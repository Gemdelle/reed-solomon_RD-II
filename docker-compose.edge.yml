# Perfil edge: nodo receptor mínimo sin UI ni auth.
# Escucha UDP en :9001 y almacena archivos recibidos.
# Uso: docker compose -f docker-compose.edge.yml up
services:
  api:
    build: ./services/api
    ports:
      - "8000:8000"
      - "9001:9001/udp"
    environment:
      FILESERVER_URL: http://fileserver:9000
      UDP_HOST: "0.0.0.0"
      UDP_PORT: "9001"
    depends_on:
      fileserver:
        condition: service_healthy
    restart: unless-stopped

  fileserver:
    build: ./services/fileserver
    environment:
      STORAGE_PATH: /data
    volumes:
      - edge_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  edge_data:
